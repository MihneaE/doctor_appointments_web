<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .forgot-password-message {
            text-align: center;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .forgot-password-message p {
            font-size: 16px;
            color: #333;
        }
        .forgot-password-message a {
            color: #4C6EF5;
            text-decoration: none;
        }
        .forgot-password-message a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="forgot-password-message">
        <p>If you forgot your password, please <a href="/forgot-password">click here</a> to reset it.</p>
    </div>
</body>
</html>
