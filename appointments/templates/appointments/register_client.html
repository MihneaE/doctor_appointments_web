{% extends 'appointments/base.html' %}

{% load static %}

{% block title %}Register as Client{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/register_client.css' %}">
{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Register as a Client</h1>
    <form method="POST" action="{% url 'register_client' %}">
        {% csrf_token %}

        <!-- Username Field -->
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>

        <!-- Name Field -->
        <div class="form-group">
            <label for="realname">Real Name</label>
            <input type="text" id="realname" name="realname" placeholder="Enter your full name" required>
        </div>

        <!-- Email Field -->
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <!-- Password Field -->
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <!-- Re-Password Field -->
        <div class="form-group">
            <label for="repassword">Re-enter Password</label>
            <input type="password" id="repassword" name="repassword" placeholder="Confirm your password" required>
        </div>

        <!-- Buttons -->
        <div class="button-group">
            <a href="{% url 'create_account' %}" class="back-button">Back</a>
            <button type="submit" class="create-button">Create</button>
        </div>
    </form>
</div>
{% endblock %}
